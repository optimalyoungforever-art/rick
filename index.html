<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>richardweb.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070f;
            --surface: rgba(12,18,34,0.78);
            --surface2: rgba(20,28,50,0.5);
            --border: rgba(255,255,255,0.06);
            --border-accent: rgba(99,224,255,0.2);
            --text: #e8edf8;
            --muted: #5a6a8a;
            --dim: #3a4a6a;
            --accent: #1de9ff;
            --accent2: #a78bfa;
            --accent3: #34eba8;
            --danger: #ff6b9d;
            --glow: rgba(29,233,255,0.12);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'DM Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas#bg {
            position:fixed;
            inset:0;
            z-index:0;
            opacity:0.4;
        }
        body::before {
            content:'';
            position:fixed;
            inset:0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity:0.025;
            z-index:0;
            pointer-events:none;
        }
        .glow-orb {
            position:fixed;
            border-radius:50%;
            filter:blur(120px);
            pointer-events:none;
            z-index:0;
        }
        .glow-orb.a {
            width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(99,224,255,0.07),transparent 70%);animation:driftA 18s ease-in-out infinite alternate;
        }
        .glow-orb.b {
            width:500px;height:500px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(167,139,250,0.09),transparent 70%);animation:driftB 14s ease-in-out infinite alternate;
        }
        @keyframes driftA {
            0%{transform:translate(0,0)}
            100%{transform:translate(80px,60px)}
        }
        @keyframes driftB {
            0%{transform:translate(0,0)}
            100%{transform:translate(-60px,-80px)}
        }
        /* ─── CARD ── */
        .card {
            position:relative;
            z-index:1;
            width:min(92vw,680px);
            max-height:92vh;
            background:var(--surface);
            backdrop-filter:blur(32px) saturate(1.4);
            border:1px solid var(--border);
            border-radius:28px;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,0 40px 80px -16px rgba(0,0,0,0.7),0 0 80px -20px var(--glow);
            animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardIn {
            from{opacity:0;transform:translateY(24px) scale(0.97)}
            to{opacity:1;transform:translateY(0) scale(1)}
        }
        .card::after {
            content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.012) 50%,transparent 100%);background-size:100% 4px;pointer-events:none;z-index:99;opacity:0.5;
        }
        /* ─── HEADER ── */
        .header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:1.1rem 1.75rem;
            border-bottom:1px solid var(--border);
            background:rgba(8,12,24,0.5);
            gap:12px;
            flex-shrink:0;
        }
        .logo-group {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .status-dot {
            width:7px;height:7px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3),0 0 18px rgba(52,235,168,0.4);animation:blink 2.5s ease-in-out infinite;flex-shrink:0;
        }
        @keyframes blink {
            0%,100%{opacity:1}
            50%{opacity:0.45}
        }
        .logo-text {
            font-family:'Syne',sans-serif;font-size:0.875rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;
        }
        .tag {
            background:rgba(29,233,255,0.08);border:1px solid rgba(29,233,255,0.2);color:var(--accent);font-size:0.6rem;font-weight:500;padding:0.18rem 0.6rem;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;
        }
        .datetime {
            display:flex;align-items:center;gap:10px;font-size:0.68rem;color:var(--muted);background:rgba(255,255,255,0.02);border:1px solid var(--border);padding:0.3rem 0.85rem;border-radius:20px;
        }
        .datetime .sep {
            width:1px;height:10px;background:var(--dim);
        }
        .datetime .t {
            color:var(--accent);font-weight:500;
        }
        /* ─── SCROLLABLE BODY ── */
        .body {
            padding:1.5rem 1.75rem;
            display:flex;
            flex-direction:column;
            gap:1.1rem;
            overflow-y:auto;
            flex:1;
        }
        .body::-webkit-scrollbar {
            width:4px;
        }
        .body::-webkit-scrollbar-track {
            background:transparent;
        }
        .body::-webkit-scrollbar-thumb {
            background:var(--dim);
            border-radius:4px;
        }
        /* ─── HERO ── */
        .hero {
            text-align:center;
        }
        .hero h1 {
            font-family:'Syne',sans-serif;font-size:clamp(1.8rem,6vw,2.5rem);font-weight:800;letter-spacing:-0.04em;line-height:1;background:linear-gradient(135deg,#ffffff 10%,#a8d8ff 50%,var(--accent) 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.35rem;
        }
        .hero p {
            font-size:0.72rem;color:var(--muted);line-height:1.6;
        }
        /* ─── SECTION LABEL ── */
        .section-label {
            font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--dim);margin-bottom:0.6rem;display:flex;align-items:center;gap:8px;
        }
        .section-label::after {
            content:'';flex:1;height:1px;background:var(--border);
        }
        /* ─── TASK ROW ── */
        .tasks {
            display:flex;flex-direction:column;gap:0.5rem;
        }
        .task {
            display:flex;
            align-items:center;
            gap:12px;
            padding:0.7rem 1rem;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:14px;
            transition:border-color 0.2s, box-shadow 0.2s, opacity 0.3s, transform 0.3s;
            animation:taskIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes taskIn {
            from{opacity:0;transform:translateY(8px) scale(0.98)}
            to{opacity:1;transform:translateY(0) scale(1)}
        }
        .task:hover {
            border-color:var(--border-accent);
            box-shadow:0 0 20px -4px rgba(29,233,255,0.1);
        }
        .task.removing {
            opacity:0;
            transform:translateX(20px) scale(0.95);
        }
        .task-check {
            width:18px;
            height:18px;
            border-radius:5px;
            border:1.5px solid var(--dim);
            cursor:pointer;
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:border-color 0.2s, background 0.2s;
            font-size:0.65rem;
        }
        .task-check:hover {
            border-color:var(--accent3);
        }
        .task-check.done {
            background:rgba(52,235,168,0.15);
            border-color:var(--accent3);
            color:var(--accent3);
        }
        .task-icon {
            width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;
        }
        .task-icon.blue {
            background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.25);
        }
        .task-icon.teal {
            background:rgba(29,233,255,0.1);border:1px solid rgba(29,233,255,0.2);
        }
        .task-icon.purple{
            background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.25);
        }
        .task-icon.green {
            background:rgba(52,235,168,0.1);border:1px solid rgba(52,235,168,0.2);
        }
        .task-icon.pink {
            background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.2);
        }
        .task-info {
            flex:1;
            min-width:0;
            text-align:left;
        }
        .task-title {
            font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        }
        .task-title.done-text {
            text-decoration:line-through;
            color:var(--muted);
        }
        .task-meta {
            font-size:0.62rem;color:var(--muted);margin-top:2px;
        }
        .pill {
            font-size:0.57rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px;white-space:nowrap;flex-shrink:0;
        }
        .pill.soon {
            background:rgba(255,107,157,0.12);color:var(--danger);border:1px solid rgba(255,107,157,0.28);
        }
        .pill.upcoming {
            background:rgba(29,233,255,0.1);color:var(--accent);border:1px solid rgba(29,233,255,0.25);
        }
        .pill.done-pill{
            background:rgba(52,235,168,0.1);color:var(--accent3);border:1px solid rgba(52,235,168,0.25);
        }
        .btn-delete {
            width:24px;height:24px;border-radius:7px;border:none;
            background:transparent;color:var(--dim);cursor:pointer;
            display:flex;align-items:center;justify-content:center;font-size:0.85rem;
            flex-shrink:0;transition:background 0.2s,color 0.2s;
        }
        .btn-delete:hover {
            background:rgba(255,107,157,0.12);color:var(--danger);
        }
        /* ─── ADD TASK BUTTON ── */
        .btn-add-task {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            width:100%;
            padding:0.65rem;
            background:rgba(29,233,255,0.05);
            border:1px dashed rgba(29,233,255,0.2);
            border-radius:14px;
            color:var(--accent);
            font-family:'DM Mono',monospace;
            font-size:0.72rem;
            cursor:pointer;
            transition:background 0.2s, border-color 0.2s, transform 0.15s;
            margin-top:0.2rem;
        }
        .btn-add-task:hover {
            background:rgba(29,233,255,0.09);border-color:rgba(29,233,255,0.4);transform:translateY(-1px);
        }
        .btn-add-task:active {
            transform:scale(0.98);
        }
        /* ─── URL SECTION ── */
        .url-bar {
            display:flex;gap:0;background:rgba(4,8,18,0.8);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;
        }
        .url-bar:focus-within {
            border-color:rgba(29,233,255,0.3);box-shadow:0 0 0 3px rgba(29,233,255,0.05);
        }
        .url-prefix {
            padding:0 0.85rem;display:flex;align-items:center;color:var(--dim);font-size:0.75rem;border-right:1px solid var(--border);user-select:none;white-space:nowrap;
        }
        .url-prefix svg {
            margin-right:6px;
        }
        .url-input {
            flex:1;background:transparent;border:none;padding:0.7rem 0.9rem;color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;outline:none;min-width:0;
        }
        .url-input::placeholder {
            color:var(--dim);
        }
        .btn-open {
            background:linear-gradient(135deg,var(--accent) 0%,#00c9e0 100%);color:#050a14;border:none;padding:0.7rem 1.35rem;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;
        }
        .btn-open:hover {
            opacity:0.88;transform:translateX(1px);
        }
        .quick-links {
            display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.55rem;
        }
        .ql-btn {
            background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.65rem;padding:0.3rem 0.75rem;border-radius:20px;cursor:pointer;transition:border-color 0.2s,color 0.2s,background 0.2s;display:flex;align-items:center;gap:5px;
        }
        .ql-btn:hover {
            border-color:var(--border-accent);color:var(--accent);background:rgba(29,233,255,0.05);
        }
        /* ─── FOOTER ── */
        .footer {
            display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1.75rem;border-top:1px solid var(--border);background:rgba(4,8,18,0.3);gap:12px;flex-shrink:0;
        }
        .footer-note {
            font-size:0.62rem;color:var(--dim);line-height:1.5;
        }
        .footer-badge {
            font-size:0.6rem;color:var(--dim);border:1px solid var(--border);padding:0.2rem 0.65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;
        }
        /* ─── MODAL OVERLAY ── */
        .modal-overlay {
            position:fixed;
            inset:0;
            z-index:200;
            background:rgba(2,5,14,0.7);
            backdrop-filter:blur(6px);
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            pointer-events:none;
            transition:opacity 0.25s;
        }
        .modal-overlay.open {
            opacity:1;
            pointer-events:all;
        }
        .modal {
            background:rgba(10,16,32,0.95);
            border:1px solid rgba(99,224,255,0.15);
            border-radius:22px;
            padding:1.75rem;
            width:min(90vw,420px);
            box-shadow:0 32px 64px -12px rgba(0,0,0,0.8), 0 0 40px -10px var(--glow);
            transform:translateY(20px) scale(0.96);
            transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
            display:flex;
            flex-direction:column;
            gap:1.1rem;
        }
        .modal-overlay.open .modal {
            transform:translateY(0) scale(1);
        }
        .modal-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        .modal-title {
            font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);
        }
        .modal-close {
            background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;padding:4px;border-radius:6px;transition:color 0.2s,background 0.2s;
        }
        .modal-close:hover {
            color:var(--text);background:rgba(255,255,255,0.05);
        }
        .field {
            display:flex;
            flex-direction:column;
            gap:0.4rem;
        }
        .field label {
            font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);
        }
        .field input, .field select {
            background:rgba(4,8,18,0.8);
            border:1px solid var(--border);
            border-radius:10px;
            padding:0.65rem 0.85rem;
            color:var(--text);
            font-family:'DM Mono',monospace;
            font-size:0.78rem;
            outline:none;
            width:100%;
            transition:border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus, .field select:focus {
            border-color:rgba(29,233,255,0.35);box-shadow:0 0 0 3px rgba(29,233,255,0.06);
        }
        .field select option {
            background:#0a1020;
        }
        .field-row {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:0.75rem;
        }
        .modal-actions {
            display:flex;
            gap:0.65rem;
            margin-top:0.25rem;
        }
        .btn-cancel {
            flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:600;padding:0.65rem;border-radius:10px;cursor:pointer;transition:border-color 0.2s,color 0.2s;
        }
        .btn-cancel:hover {
            border-color:var(--border-accent);color:var(--text);
        }
        .btn-save {
            flex:2;background:linear-gradient(135deg,var(--accent) 0%,#00c9e0 100%);border:none;color:#050a14;font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;padding:0.65rem;border-radius:10px;cursor:pointer;transition:opacity 0.2s,transform 0.15s;
        }
        .btn-save:hover {
            opacity:0.88;transform:translateY(-1px);
        }
        .btn-save:active {
            transform:scale(0.97);
        }
        /* ─── EMPTY STATE ── */
        .empty-state {
            text-align:center;padding:1rem 0;color:var(--dim);font-size:0.7rem;line-height:1.8;
        }
        .empty-state .icon {
            font-size:1.5rem;display:block;margin-bottom:0.4rem;opacity:0.4;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="glow-orb a"></div>
    <div class="glow-orb b"></div>

    <!-- ─── ADD TASK MODAL ─── -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">New Task Reminder</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="field">
                <label>Task Title</label>
                <input id="m-title" type="text" placeholder="e.g. Review pull request" maxlength="60">
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Due Date</label>
                    <input id="m-date" type="date">
                </div>
                <div class="field">
                    <label>Due Time</label>
                    <input id="m-time" type="time">
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Icon</label>
                    <select id="m-icon">
                        <option value="📋">📋 Clipboard</option>
                        <option value="⚙️">⚙️ Settings</option>
                        <option value="🚀">🚀 Launch</option>
                        <option value="💡">💡 Idea</option>
                        <option value="🔍">🔍 Research</option>
                        <option value="📝">📝 Notes</option>
                        <option value="🗂️">🗂️ Files</option>
                        <option value="⭐">⭐ Important</option>
                        <option value="🔔">🔔 Reminder</option>
                        <option value="🧪">🧪 Testing</option>
                    </select>
                </div>
                <div class="field">
                    <label>Color</label>
                    <select id="m-color">
                        <option value="blue">Blue</option>
                        <option value="teal">Teal</option>
                        <option value="purple">Purple</option>
                        <option value="green">Green</option>
                        <option value="pink">Pink</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveTask()">+ Add Task</button>
            </div>
        </div>
    </div>

    <!-- ─── MAIN CARD ─── -->
    <div class="card">
        <div class="header">
            <div class="logo-group">
                <div class="status-dot"></div>
                <span class="logo-text">richardweb.com</span>
                <span class="tag">workspace</span>
            </div>
            <div class="datetime">
                <span class="t" id="cal">—</span>
                <div class="sep"></div>
                <span class="t" id="clk">—</span>
            </div>
        </div>

        <div class="body">
            <!-- HERO -->
            <div class="hero">
                <h1>richardweb.com</h1>
                <p>Your personal workspace. Browse the web safely via external tabs.</p>
            </div>

            <!-- TASKS -->
            <div>
                <div class="section-label">Task Reminders</div>
                <div class="tasks" id="task-list"></div>
                <button class="btn-add-task" onclick="openModal()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Task Reminder
                </button>
            </div>

            <!-- URL -->
            <div>
                <div class="section-label">Open External URL</div>
                <div class="url-bar">
                    <div class="url-prefix">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        https://
                    </div>
                    <input id="url" class="url-input" type="text" value="www.google.com" placeholder="www.google.com" spellcheck="false" autocomplete="off">
                    <button class="btn-open" onclick="openURL()">
                        Open
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </div>
                <div class="quick-links">
                    <button class="ql-btn" onclick="setURL('www.google.com')">🔍 Google</button>
                    <button class="ql-btn" onclick="setURL('www.youtube.com')">▶ YouTube</button>
                    <button class="ql-btn" onclick="setURL('mail.google.com')">✉ Gmail</button>
                    <button class="ql-btn" onclick="setURL('www.wikipedia.org')">📖 Wikipedia</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p class="footer-note">⚠ Enable popups in your browser if tabs are blocked.</p>
            <span class="footer-badge">v3.0 · secure</span>
        </div>
    </div>

    <script>
        /* ── Particle canvas ── */
        (function(){
            const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
            let W,H,P=[];
            function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
            function init(){P=[];for(let i=0;i<55;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.3,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,o:Math.random()*0.5+0.1});}
            function draw(){
                ctx.clearRect(0,0,W,H);
                for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){ctx.beginPath();ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);ctx.strokeStyle=`rgba(29,233,255,${0.07*(1-d/130)})`;ctx.lineWidth=0.5;ctx.stroke();}}
                P.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(29,233,255,${p.o})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;});
                requestAnimationFrame(draw);
            }
            resize();init();draw();
            window.addEventListener('resize',()=>{resize();init();});
        })();

        /* ── Clock ── */
        function tick(){
            const n=new Date();
            document.getElementById('cal').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
            document.getElementById('clk').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        }
        tick();
        setInterval(tick,1000);

        /* ── URL ── */
        function openURL(){let v=document.getElementById('url').value.trim();if(!v)return;if(!v.startsWith('http'))v='https://'+v;window.open(v,'_blank','noopener,noreferrer');}
        function setURL(u){document.getElementById('url').value=u;document.getElementById('url').focus();}
        document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')openURL();});

        /* ── Task storage ── */
        const STORE_KEY = 'rw_tasks_v1';
        function loadTasks(){
            try { return JSON.parse(localStorage.getItem(STORE_KEY)) || getDefaultTasks(); } 
            catch { return getDefaultTasks(); }
        }
        function saveTasks(tasks){ localStorage.setItem(STORE_KEY, JSON.stringify(tasks)); }
        function getDefaultTasks(){
            return [
                {id:'t1',title:'Full-stack task management application',date:'2026-05-05',time:'19:25',icon:'📋',color:'blue',done:false},
                {id:'t2',title:'Task reminder configuration',date:'2026-05-05',time:'19:35',icon:'⚙️',color:'teal',done:false}
            ];
        }
        let tasks = loadTasks();

        /* ── Badge logic ── */
        function getBadge(dateStr, timeStr, done){
            if(done) return {label:'Done', cls:'done-pill'};
            if(!dateStr) return {label:'No Date', cls:'upcoming'};
            const due = new Date(dateStr + (timeStr ? 'T'+timeStr : 'T23:59'));
            const diff = due - Date.now();
            if(diff < 0) return {label:'Overdue', cls:'soon'};
            if(diff < 3600000*3) return {label:'Due Soon', cls:'soon'};
            return {label:'Upcoming', cls:'upcoming'};
        }
        function fmtDate(dateStr, timeStr){
            if(!dateStr) return 'No due date';
            const d = new Date(dateStr + (timeStr ? 'T'+timeStr : 'T12:00'));
            return d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
        }

        /* ── Render tasks ── */
        function renderTasks(){
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            if(tasks.length === 0){
                list.innerHTML = '<div class="empty-state"><span class="icon">📭</span>No reminders yet.<br>Click "+ Add Task Reminder" to get started.</div>';
                return;
            }
            tasks.forEach((t,i) => {
                const badge = getBadge(t.date, t.time, t.done);
                const div = document.createElement('div');
                div.className = 'task';
                div.dataset.id = t.id;
                div.style.animationDelay = (i * 0.04) + 's';
                div.innerHTML = `
                    <div class="task-check ${t.done?'done':''}" onclick="toggleDone('${t.id}')">${t.done?'✓':''}</div>
                    <div class="task-icon ${t.color}">${t.icon}</div>
                    <div class="task-info">
                        <div class="task-title ${t.done?'done-text':''}">${escHtml(t.title)}</div>
                        <div class="task-meta">${fmtDate(t.date,t.time)}</div>
                    </div>
                    <span class="pill ${badge.cls}">${badge.label}</span>
                    <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    </button>
                `;
                list.appendChild(div);
            });
        }
        function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function toggleDone(id){
            const t = tasks.find(x=>x.id===id);
            if(t){ t.done=!t.done; saveTasks(tasks); renderTasks(); }
        }
        function deleteTask(id){
            const el = document.querySelector(`.task[data-id="${id}"]`);
            if(el){
                el.classList.add('removing');
                setTimeout(()=>{
                    tasks=tasks.filter(x=>x.id!==id);
                    saveTasks(tasks);
                    renderTasks();
                }, 280);
            }
        }

        /* ── Modal ── */
        function openModal(){
            const n=new Date(Date.now()+3600000);
            const pad=x=>String(x).padStart(2,'0');
            document.getElementById('m-date').value=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
            document.getElementById('m-time').value=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
            document.getElementById('m-title').value='';
            document.getElementById('modal').classList.add('open');
            setTimeout(()=>document.getElementById('m-title').focus(),200);
        }
        function closeModal(){ document.getElementById('modal').classList.remove('open'); }
        function saveTask(){
            const title = document.getElementById('m-title').value.trim();
            if(!title){ document.getElementById('m-title').focus(); return; }
            const task = {
                id: 't'+Date.now(),
                title,
                date: document.getElementById('m-date').value,
                time: document.getElementById('m-time').value,
                icon: document.getElementById('m-icon').value,
                color: document.getElementById('m-color').value,
                done: false
            };
            tasks.push(task);
            saveTasks(tasks);
            renderTasks();
            closeModal();
        }

        document.getElementById('modal').addEventListener('click', function(e){ if(e.target === this) closeModal(); });
        document.addEventListener('keydown', e=>{
            if(e.key==='Escape') closeModal();
            if(e.key==='Enter' && document.getElementById('modal').classList.contains('open')){
                const active=document.activeElement;
                if(active && (active.tagName==='INPUT'||active.tagName==='SELECT')) saveTask();
            }
        });

        setInterval(renderTasks, 60000);
        renderTasks();
    </script>
</body>
</html>
